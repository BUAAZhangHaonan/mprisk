name: mprisk
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.11
  - pip>=24.2
  - ca-certificates
  - certifi
  - openssl
  - pip:
      - joblib==1.4.2
      - fastapi==0.115.6
      - httpx==0.28.1
      - jsonschema==4.23.0
      - matplotlib==3.10.1
      - numpy==2.2.4
      - pandas==2.2.3
      - pyarrow==19.0.1
      - pydantic==2.11.2
      - pytest==8.3.5
      - pytest-cov==6.1.1
      - pyyaml==6.0.2
      - rich==14.0.0
      - ruff==0.11.2
      - safetensors==0.5.3
      - scikit-learn==1.6.1
      - scipy==1.15.2
      - seaborn==0.13.2
      - tqdm==4.67.1
      - --extra-index-url https://download.pytorch.org/whl/cpu
      - torch==2.12.1+cpu
      - uvicorn==0.34.0
variables:
  PYTHONNOUSERSITE: "1"
