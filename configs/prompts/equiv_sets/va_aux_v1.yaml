schema: mprisk_equiv_prompt_set_v1
key: va_aux_v1
protocol: va
version: v1
active: true
canonical_prompt: "Based on the complete input, describe the person's overall emotional state in one concise sentence. Do not address the person, give advice, or explain your reasoning."
templates:
  - prompt_id: va_aux_v1_t01
    role: user
    enabled: true
    template_text: |
      You are judging the Stage-1 emotion signal in a visual-audio sample.
      Sample: {sample_text}
      Question: {question}
      Give the most likely emotion and a brief reason.
  - prompt_id: va_aux_v1_t02
    role: user
    enabled: true
    template_text: |
      Review the visual-audio sample and identify the main emotional state.
      Input: {sample_text}
      Task: {question}
      Answer with one emotion label and one short explanation.
