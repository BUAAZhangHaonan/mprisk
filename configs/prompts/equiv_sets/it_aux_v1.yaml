schema: mprisk_equiv_prompt_set_v1
key: it_aux_v1
protocol: it
version: v1
active: true
templates:
  - prompt_id: it_aux_v1_t01
    role: user
    enabled: true
    template_text: |
      You are judging the Stage-1 emotion signal in an image-text sample.
      Sample: {sample_text}
      Question: {question}
      Give the most likely emotion and a brief reason.
  - prompt_id: it_aux_v1_t02
    role: user
    enabled: true
    template_text: |
      Read the image-text sample and decide the main emotional state.
      Input: {sample_text}
      Task: {question}
      Answer with one emotion label and one short explanation.
